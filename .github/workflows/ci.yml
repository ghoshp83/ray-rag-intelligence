name: ci

on:
  push:
    branches: [main]
  pull_request:

# A branch's PR already runs CI on its `pull_request` event; without scoping
# `push` to main, every push to a PR branch ran the suite twice. Cancel a
# superseded run when a newer commit lands on the same ref so rapid pushes don't
# queue redundant work.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src tests scripts
      - name: Format check (ruff)
        run: ruff format --check src tests scripts
      - name: Type check (mypy)
        run: mypy src scripts
      - name: Tests (pytest)
        run: pytest -q
