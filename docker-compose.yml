# Local Ray cluster: one head + one worker, same image. The head exposes the
# Ray dashboard (8265) and the Serve HTTP endpoint (8000). Train/serve/eval are
# run as `docker compose exec ray-head ...` so they join this cluster.
services:
  ray-head:
    build: .
    shm_size: "2gb"          # Ray's object store needs shared memory
    env_file: .env           # ANTHROPIC_API_KEY for the generator
    ports:
      - "8265:8265"          # Ray dashboard
      - "8000:8000"          # Ray Serve HTTP
    volumes:
      - artifacts:/app/artifacts   # index + trained models, shared with the worker
    command: ray start --head --dashboard-host 0.0.0.0 --port 6379 --block

  ray-worker:
    build: .
    shm_size: "2gb"
    depends_on:
      - ray-head
    volumes:
      - artifacts:/app/artifacts   # same volume: Serve replicas here load the same models
    command: ray start --address=ray-head:6379 --block

# `make ingest`/`make train` run in ray-head and write to /app/artifacts; Serve can
# schedule any deployment (Retriever/Reranker/Router/Generator) onto the worker, so
# both nodes mount one named volume — otherwise a replica on the worker hits
# FileNotFoundError loading the index/models (see RUNBOOK "failure handling").
volumes:
  artifacts:
